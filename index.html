<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Our 365 Days</title>

<style>
body{
margin:0;
background:#070A10;
color:white;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
text-align:center;
}

header{
margin-top:60px;
animation:fadeDown 1s ease;
}

h1{
font-size:64px;
margin:0;
letter-spacing:2px;
}

.date{
color:rgba(255,255,255,.65);
margin-top:10px;
font-size:18px;
}

.wrap{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.shot{
margin:25px 0;
opacity:0;
transform:translateY(20px);
transition:.6s;
}

.shot.show{
opacity:1;
transform:translateY(0);
}

.shot img{
width:100%;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.5);
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<h1>Our 365 Days</h1>
<div class="date">March 23, 2025 — March 23, 2026</div>
</header>

<div class="wrap">

<div class="shot"><img src="1.jpg"></div>
<div class="shot"><img src="2.jpg"></div>
<div class="shot"><img src="3.jpg"></div>
<div class="shot"><img src="4.jpg"></div>
<div class="shot"><img src="5.jpg"></div>
<div class="shot"><img src="6.jpg"></div>
<div class="shot"><img src="7.jpg"></div>
<div class="shot"><img src="8.jpg"></div>
<div class="shot"><img src="9.jpg"></div>
<div class="shot"><img src="10.jpg"></div>

</div>

<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

<script>
const shots=document.querySelectorAll('.shot');
const io=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add('show');
}
});
});
shots.forEach(s=>io.observe(s));

const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightboxImg');

document.querySelectorAll('.shot img').forEach(img=>{
img.onclick=()=>{
lightbox.style.display='flex';
lightboxImg.src=img.src;
}
});

lightbox.onclick=()=>{
lightbox.style.display='none';
}
</script>

</body>
</html>
